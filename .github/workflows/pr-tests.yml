name: PR tests

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  quick-tests:
    name: Run quick pyflow_acdc tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install package
        run: python -m pip install -e .

      - name: Run quick test suite
        run: pyflow-acdc-test --quick
